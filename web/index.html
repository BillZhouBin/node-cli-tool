<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开发者工具箱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 导航栏 */
    .nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 6px;
    }

    .nav-btn {
      flex: 1;
      max-width: 200px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.85);
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .nav-btn.active {
      background: #fff;
      color: #667eea;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    /* 卡片 */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .card h2 {
      color: #333;
      margin-bottom: 24px;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      color: #555;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      min-height: 150px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 14px;
      line-height: 1.5;
      resize: vertical;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      padding: 11px 24px;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-toggle {
      background: #e9ecef;
      color: #666;
    }

    .btn-toggle:hover {
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }

    .btn-toggle.active {
      background: #28a745;
      color: #fff;
      box-shadow: 0 3px 15px rgba(40, 167, 69, 0.4);
    }

    .btn.active {
      background: #28a745;
      box-shadow: 0 3px 15px rgba(40, 167, 69, 0.4);
    }

    .btn-secondary {
      background: #6c757d;
    }

    .btn-secondary:hover {
      box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 10px;
      border-left: 4px solid #667eea;
    }

    .result-label {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .result-value {
      color: #333;
      font-size: 1.2rem;
      font-weight: 600;
      word-break: break-all;
    }

    .copy-btn {
      background: #28a745;
      padding: 11px 24px;
      border-radius: 10px;
    }

    .result > .copy-btn {
      margin-top: 10px;
    }

    .copy-btn:hover {
      box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
    }

    /* 当前时间 */
    .current-time {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .current-time .time-label {
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
    }

    .current-time .time-value {
      color: #fff;
      font-size: 2rem;
      font-weight: bold;
      margin: 8px 0;
    }

    .current-time .date-value {
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.6rem;
      }

      .nav {
        flex-wrap: wrap;
      }

      .nav-btn {
        max-width: none;
        flex: 1 1 30%;
        font-size: 0.85rem;
        padding: 10px 14px;
      }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* 分隔线 */
    hr.divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 20px 0;
    }

    .json-error {
      color: #dc3545;
      font-size: 0.9rem;
    }

    /* JSON 折叠视图 */
    .json-fold-view {
      flex: 1;
      min-height: 0;
      background: #fafafa;
      border: 2px solid #ddd;
      border-radius: 10px;
      overflow: auto;
      font-family: 'Monaco','Menlo','Ubuntu Mono',monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 12px 0;
      display: none;
      color: #333;
    }

    .json-fold-view.active {
      display: block;
    }

    .json-fold-line {
      display: flex;
      align-items: baseline;
      padding: 0 12px;
      white-space: pre;
      cursor: default;
    }

    .json-fold-line:hover {
      background: rgba(0,0,0,0.03);
    }

    .json-fold-line-num {
      display: inline-block;
      min-width: 38px;
      text-align: right;
      padding-right: 14px;
      margin-right: 8px;
      color: #999;
      font-size: 12px;
      user-select: none;
      flex-shrink: 0;
      border-right: 1px solid #e0e0e0;
    }

    .json-fold-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      cursor: default;
      color: #aaa;
      font-size: 10px;
      flex-shrink: 0;
      margin-right: 4px;
      user-select: none;
      border-radius: 3px;
      transition: all 0.15s;
      visibility: hidden;
    }

    .json-fold-toggle.can-fold {
      visibility: visible;
      cursor: pointer;
      color: #888;
    }

    .json-fold-toggle.can-fold:hover {
      color: #333;
      background: rgba(0,0,0,0.06);
    }

    .json-fold-line.hidden {
      display: none;
    }

    #jsonInput.hidden-by-fold {
      display: none;
    }

    .json-fold-collapsed-hint {
      color: #6a9955;
      margin-left: 20px;
    }

    /* 带行号的编辑器（编辑模式） */
    .lined-editor {
      display: none;
      flex: 1;
      min-height: 0;
      border: 2px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      background: #fafafa;
    }

    .lined-editor.active {
      display: flex;
    }

    .lined-editor:focus-within {
      border-color: #667eea;
    }

    .lined-editor-numbers {
      flex-shrink: 0;
      width: 52px;
      overflow: hidden;
      padding: 12px 0;
      background: #f0f0f0;
      border-right: 1px solid #e0e0e0;
      text-align: right;
      font-family: 'Monaco','Menlo','Ubuntu Mono',monospace;
      font-size: 13px;
      line-height: 1.7;
      color: #999;
      user-select: none;
      pointer-events: none;
    }

    .lined-editor-numbers span {
      display: block;
      padding-right: 14px;
    }

    .lined-editor-textarea {
      flex: 1;
      min-height: 0;
      padding: 12px 15px;
      border: none;
      outline: none;
      resize: none;
      background: #fafafa;
      color: #333;
      font-family: 'Monaco','Menlo','Ubuntu Mono',monospace;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre;
      overflow-wrap: normal;
      overflow: auto;
      border-radius: 0 10px 10px 0;
      -webkit-text-fill-color: #333;
      caret-color: #333;
    }

    .lined-editor-textarea::placeholder {
      color: #aaa;
    }

    /* ===== 暗色主题覆盖 ===== */
    .json-fold-view.theme-dark {
      background: #1e1e1e;
      border-color: #333;
      color: #d4d4d4;
    }

    .json-fold-view.theme-dark .json-fold-line:hover {
      background: rgba(255,255,255,0.04);
    }

    .json-fold-view.theme-dark .json-fold-line-num {
      color: #555;
      border-right-color: #333;
    }

    .json-fold-view.theme-dark .json-fold-toggle.can-fold {
      color: #999;
    }

    .json-fold-view.theme-dark .json-fold-toggle.can-fold:hover {
      color: #ccc;
      background: rgba(255,255,255,0.1);
    }

    .lined-editor.theme-dark {
      background: #1e1e1e;
      border-color: #333;
    }

    .lined-editor.theme-dark:focus-within {
      border-color: #667eea;
    }

    .lined-editor.theme-dark .lined-editor-numbers {
      background: #1a1a1a;
      border-right-color: #333;
      color: #555;
    }

    .lined-editor.theme-dark .lined-editor-textarea {
      background: #1e1e1e;
      color: #d4d4d4;
      -webkit-text-fill-color: #d4d4d4;
      caret-color: #fff;
    }

    .lined-editor.theme-dark .lined-editor-textarea::placeholder {
      color: #555;
    }

    /* 主题切换按钮 */
    .theme-toggle-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      padding: 3px 8px;
      font-size: 0.95rem;
      color: #888;
      transition: all 0.2s;
      vertical-align: middle;
      margin-left: 4px;
      line-height: 1;
    }

    .theme-toggle-btn:hover {
      color: #333;
      border-color: #aaa;
    }

    /* ===== #jsonInput textarea 亮色默认 + 暗色主题 ===== */
    #jsonInput {
      background: #fafafa;
      color: #333;
      border-color: #ddd;
      -webkit-text-fill-color: #333;
      caret-color: #333;
    }

    #jsonInput::placeholder {
      color: #aaa;
    }

    #jsonInput:focus {
      border-color: #667eea;
    }

    #jsonInput.theme-dark {
      background: #1e1e1e;
      color: #d4d4d4;
      border-color: #333;
      -webkit-text-fill-color: #d4d4d4;
      caret-color: #fff;
    }

    #jsonInput.theme-dark::placeholder {
      color: #555;
    }

    #jsonInput.theme-dark:focus {
      border-color: #667eea;
    }

    /* ===== 全屏 overlay 亮色默认 + 暗色主题 ===== */
    .fullscreen-overlay {
      background: #fafafa;
    }

    .fullscreen-overlay .fullscreen-header {
      color: #333;
    }

    .fullscreen-overlay textarea {
      background: #fafafa;
      color: #333;
      border-color: #ddd;
      -webkit-text-fill-color: #333;
      caret-color: #333;
    }

    .fullscreen-overlay .fullscreen-close {
      color: #666;
    }

    .fullscreen-overlay .fullscreen-close:hover { color: #333; }

    .fullscreen-overlay.theme-dark {
      background: #1e1e1e;
    }

    .fullscreen-overlay.theme-dark .fullscreen-header {
      color: #d4d4d4;
    }

    .fullscreen-overlay.theme-dark textarea {
      background: #1e1e1e;
      color: #d4d4d4;
      border-color: #333;
      -webkit-text-fill-color: #d4d4d4;
      caret-color: #fff;
    }

    .fullscreen-overlay.theme-dark .fullscreen-close {
      color: #aaa;
    }

    .fullscreen-overlay.theme-dark .fullscreen-close:hover { color: #d4d4d4; }

    /* JSON 面板撑满视口 */
    #panel-json.active {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 220px);
      min-height: 400px;
    }

    #panel-json.active .card {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #panel-json .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #panel-json .card-body .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #panel-json .card-body .input-group textarea {
      flex: 1;
      min-height: 0;
    }

    /* 全屏 */
    .fullscreen-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      padding: 15px 25px;
    }

    .fullscreen-overlay textarea {
      flex: 1;
      min-height: 0;
      font-family: 'Monaco','Menlo','Ubuntu Mono',monospace;
      font-size: 15px;
      line-height: 1.6;
      border-radius: 10px;
      padding: 15px;
      resize: none;
    }

    .fullscreen-overlay textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .fullscreen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 1rem;
      font-weight: 600;
    }

    .fullscreen-close {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      padding: 0 8px;
      line-height: 1;
    }

    .fullscreen-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      padding: 4px 10px;
      font-size: 1.1rem;
      color: #888;
      transition: color 0.2s, border-color 0.2s;
      vertical-align: middle;
      margin-left: 8px;
    }

    .fullscreen-btn:hover {
      color: #333;
      border-color: #aaa;
    }

    /* 隐藏面板 */
    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* 时间转换内部的两列卡片 */
    .time-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 当前时间 -->
    <div class="current-time">
      <div class="time-label">当前 Unix 时间戳（点击复制）</div>
      <div class="time-value" id="currentTimestamp" onclick="copyTimestamp()" title="点击复制" style="cursor:pointer;">-</div>
      <div class="date-value" id="currentDate">-</div>
    </div>

    <!-- 导航栏 -->
    <nav class="nav">
      <button class="nav-btn active" onclick="switchTool('time')" id="nav-time">⏰ 时间转换</button>
      <button class="nav-btn" onclick="switchTool('color')" id="nav-color">🎨 颜色工具</button>
      <button class="nav-btn" onclick="switchTool('json')" id="nav-json">📋 JSON 工具</button>
    </nav>

    <!-- ==================== 时间转换面板 ==================== -->
    <div id="panel-time" class="panel active">
      <div class="grid-2">
        <!-- 时间戳 → 日期 -->
        <div class="time-card">
          <h2>⏰ 时间戳 → 日期</h2>
          <div class="input-group">
            <label>时间戳（秒/毫秒自动识别）</label>
            <input type="text" id="tsInput" placeholder="例如: 1713787200 或 1713787200000">
          </div>
          <div class="input-group">
            <label>时区</label>
            <select id="tsTimezone">
              <option value="Asia/Shanghai">Asia/Shanghai (北京时间)</option>
              <option value="UTC">UTC</option>
              <option value="Asia/Tokyo">Asia/Tokyo (东京时间)</option>
              <option value="America/New_York">America/New_York (纽约时间)</option>
              <option value="Europe/London">Europe/London (伦敦时间)</option>
            </select>
          </div>
          <div class="input-group">
            <label>输出格式</label>
            <input type="text" id="tsFormat" value="YYYY-MM-DD HH:mm:ss" placeholder="YYYY-MM-DD HH:mm:ss">
          </div>
          <div class="btn-group">
            <button class="btn" onclick="convertTsToDate()">转换</button>
            <button class="btn btn-secondary" onclick="useCurrentTimestamp()">使用当前时间</button>
          </div>
          <div class="result" id="tsResult" style="display:none;">
            <div class="result-label">转换结果</div>
            <div class="result-value" id="tsResultValue"></div>
            <button class="btn copy-btn" onclick="copyResult('tsResultValue')">复制结果</button>
          </div>
        </div>

        <!-- 日期 → 时间戳 -->
        <div class="time-card">
          <h2>📅 日期 → 时间戳</h2>
          <div class="input-group">
            <label>日期时间</label>
            <input type="text" id="dateInput" placeholder="例如: 2024-04-22 20:00:00">
          </div>
          <div class="input-group">
            <label>时区</label>
            <select id="dateTimezone">
              <option value="Asia/Shanghai">Asia/Shanghai (北京时间)</option>
              <option value="UTC">UTC</option>
              <option value="Asia/Tokyo">Asia/Tokyo (东京时间)</option>
              <option value="America/New_York">America/New_York (纽约时间)</option>
              <option value="Europe/London">Europe/London (伦敦时间)</option>
            </select>
          </div>
          <div class="input-group">
            <label>输出单位</label>
            <select id="dateUnit">
              <option value="seconds">秒 (10位)</option>
              <option value="milliseconds">毫秒 (13位)</option>
            </select>
          </div>
          <div class="btn-group">
            <button class="btn" onclick="convertDateToTs()">转换</button>
            <button class="btn btn-secondary" onclick="useCurrentDate()">使用当前时间</button>
          </div>
          <div class="result" id="dateResult" style="display:none;">
            <div class="result-label">转换结果</div>
            <div class="result-value" id="dateResultValue"></div>
            <button class="btn copy-btn" onclick="copyResult('dateResultValue')">复制结果</button>
          </div>
        </div>
      </div>

      <!-- 时间差计算 -->
      <div class="time-card" style="margin-top:20px;">
        <h2>🧮 时间差计算</h2>
        <div class="grid-2">
          <div class="input-group">
            <label>开始时间</label>
            <input type="text" id="startTime" placeholder="时间戳或日期">
          </div>
          <div class="input-group">
            <label>结束时间</label>
            <input type="text" id="endTime" placeholder="时间戳或日期">
          </div>
        </div>
        <div class="btn-group">
          <button class="btn" onclick="calculateDiff()">计算差值</button>
        </div>
        <div class="result" id="diffResult" style="display:none;">
          <div class="result-label">时间差</div>
          <div class="result-value" id="diffResultValue"></div>
        </div>
      </div>
    </div>

    <!-- ==================== 颜色工具面板 ==================== -->
    <div id="panel-color" class="panel">
      <div class="card">
        <h2>🎨 颜色值计算</h2>

        <!-- 解析色值 -->
        <div class="input-group">
          <label>输入色值（如 #ff000000 或 0xFF000000）</label>
          <input type="text" id="colorInput" placeholder="#ff000000 或 0xFF000000">
        </div>
        <div class="btn-group">
          <button class="btn" onclick="parseColor()">解析色值</button>
        </div>
        <div class="result" id="colorParseResult" style="display:none;">
          <div class="result-label">解析结果</div>
          <div style="display:flex;align-items:center;gap:15px;">
            <div id="colorPreview" style="width:80px;height:80px;border-radius:10px;border:2px solid #e0e0e0;"></div>
            <div>
              <div id="colorHexValue" class="result-value"></div>
              <div id="colorRgbaValue" style="color:#888;font-size:0.9rem;margin-top:5px;"></div>
            </div>
          </div>
        </div>

        <hr class="divider">

        <!-- 透明度转换 -->
        <h3 style="color:#555;font-size:1rem;margin-bottom:15px;">🔀 透明度转换</h3>
        <div class="grid-2">
          <div class="input-group">
            <label>色值（如 #000000）</label>
            <input type="text" id="baseColorInput" placeholder="#000000">
          </div>
        </div>
        <div class="input-group">
          <label>透明度</label>
          <div style="display:flex;gap:10px;align-items:center;">
            <input type="text" id="alphaInput" placeholder="1A" style="flex:1;min-width:0;">
            <div class="btn-group" style="margin:0;">
              <button class="btn btn-toggle" onclick="switchAlphaType('hex')" id="btn-hex" style="padding:12px 15px;">HEX</button>
              <button class="btn btn-toggle" onclick="switchAlphaType('percent')" id="btn-percent" style="padding:12px 15px;">%</button>
            </div>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn" onclick="calculateAlphaColor()">计算颜色</button>
        </div>
        <div class="result" id="alphaResult" style="display:none;">
          <div class="result-label">计算结果</div>
          <div style="display:flex;align-items:center;gap:15px;">
            <div id="alphaColorPreview" style="width:80px;height:80px;border-radius:10px;border:2px solid #e0e0e0;"></div>
            <div>
              <div id="alphaColorHex" class="result-value"></div>
              <div id="alphaPercent" style="color:#28a745;font-size:0.9rem;margin-top:5px;"></div>
            </div>
          </div>
          <button class="btn copy-btn" onclick="copyColorResult()">复制色值</button>
        </div>
      </div>
    </div>

    <!-- ==================== JSON 工具面板 ==================== -->
    <div id="panel-json" class="panel">
      <div class="card">
        <h2 style="display:flex;align-items:center;justify-content:space-between;">
          <span>📋 JSON 格式化 / 压缩</span>
          <span>
            <button id="jsonThemeBtn" class="theme-toggle-btn" onclick="toggleJsonTheme()" title="切换亮色/暗色主题">☀️</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全屏编辑">⛶</button>
          </span>
        </h2>
        <div class="btn-group" style="margin-bottom:12px;">
          <button class="btn" onclick="processJson('beautify')">美化</button>
          <button class="btn" onclick="processJson('minify')">压缩</button>
          <button class="btn copy-btn" onclick="copyJsonInput()">复制</button>
          <button class="btn btn-secondary" onclick="clearJson()">清空</button>
          <button class="btn btn-secondary" id="btnEditFold" style="display:none;" onclick="toggleEditMode()">编辑</button>
        </div>
        <div class="card-body">
        <div class="input-group">
          <label style="display:flex;align-items:center;gap:10px;">输入 JSON
            <span id="jsonStatus" style="color:#888;font-size:0.85rem;display:none;font-weight:400;"></span>
            <span id="jsonInputError" class="json-error" style="display:none;font-weight:400;margin:0;"></span>
          </label>
          <textarea id="jsonInput" placeholder='粘贴或输入 JSON 内容，例如：
{
  "name": "张三",
  "age": 25,
  "skills": ["JavaScript", "Node.js"]
}'></textarea>
          <div id="jsonFoldedView" class="json-fold-view"></div>
          <div id="jsonLinedEditor" class="lined-editor">
            <div class="lined-editor-numbers" id="linedEditorNumbers"></div>
            <textarea id="jsonLinedTextarea" class="lined-editor-textarea" spellcheck="false" placeholder="粘贴或输入 JSON 内容..."></textarea>
          </div>
        </div>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast">已复制到剪贴板</div>

  <script>
    // ========== 面板切换 ==========
    function switchTool(tool) {
      // 切换导航按钮状态
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('nav-' + tool).classList.add('active');

      // 切换面板显示
      document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
      document.getElementById('panel-' + tool).classList.add('active');
    }

    // ========== 时间工具 ==========
    function updateCurrentTime() {
      const now = Date.now();
      const date = new Date(now);
      document.getElementById('currentTimestamp').textContent = now;
      document.getElementById('currentDate').textContent = formatDate(date, 'YYYY-MM-DD HH:mm:ss');
    }

    function formatDate(date, format) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');

      return format
        .replace('YYYY', year)
        .replace('MM', month)
        .replace('DD', day)
        .replace('HH', hours)
        .replace('mm', minutes)
        .replace('ss', seconds);
    }

    function parseTimestamp(input) {
      const ts = parseInt(input.trim());
      if (isNaN(ts)) return null;
      return ts.toString().length <= 10 ? ts * 1000 : ts;
    }

    function parseDate(dateStr) {
      const s = dateStr.trim();

      // 纯数字 → 当作时间戳
      if (/^\d+$/.test(s)) {
        const ts = parseInt(s);
        if (ts > 0) {
          return s.length <= 10 ? ts * 1000 : ts;
        }
      }

      // 先用正则匹配标准日期格式（确保本地时间解析正确）
      const patterns = [
        /^(\d{4})-(\d{1,2})-(\d{1,2})(?:\s+(\d{1,2}):(\d{1,2}):(\d{1,2}))?$/,
        /^(\d{4})\/(\d{1,2})\/(\d{1,2})(?:\s+(\d{1,2}):(\d{1,2}):(\d{1,2}))?$/
      ];
      for (const p of patterns) {
        const m = s.match(p);
        if (m) {
          return new Date(
            parseInt(m[1]), parseInt(m[2]) - 1,
            parseInt(m[3]),
            m[4] ? parseInt(m[4]) : 0,
            m[5] ? parseInt(m[5]) : 0,
            m[6] ? parseInt(m[6]) : 0
          ).getTime();
        }
      }

      // 最后尝试浏览器原生解析
      const date = new Date(s);
      return isNaN(date.getTime()) ? null : date.getTime();
    }

    function convertTsToDate() {
      const input = document.getElementById('tsInput').value;
      const timezone = document.getElementById('tsTimezone').value;
      const format = document.getElementById('tsFormat').value || 'YYYY-MM-DD HH:mm:ss';

      if (!input) { alert('请输入时间戳'); return; }

      const ts = parseTimestamp(input);
      if (ts === null) { alert('无效的时间戳格式'); return; }

      const date = new Date(ts);
      let result = formatDate(date, format);

      if (timezone !== 'UTC') {
        const offset = getTimezoneOffset(timezone);
        date.setMinutes(date.getMinutes() + offset);
        result = formatDate(date, format);
      }

      document.getElementById('tsResultValue').textContent = result;
      document.getElementById('tsResult').style.display = 'block';
    }

    function getTimezoneOffset(timezone) {
      const offsets = {
        'Asia/Shanghai': 0,
        'Asia/Tokyo': -60,
        'America/New_York': 780,
        'Europe/London': -480
      };
      return offsets[timezone] || 0;
    }

    function convertDateToTs() {
      const input = document.getElementById('dateInput').value;
      const unit = document.getElementById('dateUnit').value;

      if (!input) { alert('请输入日期'); return; }

      const ts = parseDate(input);
      if (ts === null) { alert('无效的日期格式'); return; }

      const result = unit === 'seconds' ? Math.floor(ts / 1000) : ts;
      document.getElementById('dateResultValue').textContent = result;
      document.getElementById('dateResult').style.display = 'block';
    }

    function useCurrentTimestamp() {
      document.getElementById('tsInput').value = Math.floor(Date.now() / 1000);
      convertTsToDate();
    }

    function useCurrentDate() {
      document.getElementById('dateInput').value = formatDate(new Date(), 'YYYY-MM-DD HH:mm:ss');
    }

    function calculateDiff() {
      const start = document.getElementById('startTime').value;
      const end = document.getElementById('endTime').value;

      if (!start || !end) { alert('请输入开始和结束时间'); return; }

      const startTs = parseDate(start);
      const endTs = parseDate(end);

      if (startTs === null || endTs === null) { alert('时间格式无效'); return; }

      const diff = Math.abs(endTs - startTs);
      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);

      const result = `相差 ${diff} 毫秒 = ${seconds} 秒 = ${minutes} 分钟 = ${hours} 小时 = ${days} 天`;
      document.getElementById('diffResultValue').innerHTML = result.replace(/ = /g, '<br>= ');
      document.getElementById('diffResult').style.display = 'block';
    }

    // ========== 颜色工具 ==========
    let currentColorResult = '';
    let currentAlphaType = 'hex';

    function parseColor() {
      const input = document.getElementById('colorInput').value.trim();
      if (!input) { alert('请输入色值'); return; }

      let hex = input;
      if (input.toLowerCase().startsWith('0x')) {
        hex = '#' + input.substring(2);
      }
      hex = hex.toUpperCase();

      if (!/^#([0-9A-F]{6}|[0-9A-F]{8})$/i.test(hex)) {
        alert('无效的色值格式，请输入 6 位或 8 位十六进制颜色值');
        return;
      }

      let r, g, b, a;
      if (hex.length === 9) {
        a = parseInt(hex.substring(1, 3), 16);
        r = parseInt(hex.substring(3, 5), 16);
        g = parseInt(hex.substring(5, 7), 16);
        b = parseInt(hex.substring(7, 9), 16);
      } else {
        a = 255;
        r = parseInt(hex.substring(1, 3), 16);
        g = parseInt(hex.substring(3, 5), 16);
        b = parseInt(hex.substring(5, 7), 16);
      }

      document.getElementById('colorPreview').style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
      document.getElementById('colorHexValue').textContent = hex;
      document.getElementById('colorRgbaValue').textContent = `RGBA(${r}, ${g}, ${b}, ${(a / 255).toFixed(2)}) | 不透明度: ${Math.round(a / 255 * 100)}%`;
      document.getElementById('colorParseResult').style.display = 'block';
      currentColorResult = hex;
    }

    function switchAlphaType(type) {
      const prevType = currentAlphaType;
      currentAlphaType = type;
      const alphaInput = document.getElementById('alphaInput');
      const btnHex = document.getElementById('btn-hex');
      const btnPercent = document.getElementById('btn-percent');

      btnHex.classList.toggle('active', type === 'hex');
      btnPercent.classList.toggle('active', type === 'percent');

      alphaInput.placeholder = type === 'hex' ? '1A' : '10';

      // 如果用户已输入有效值，切换时自动转换
      const val = alphaInput.value.trim();
      if (val && prevType !== type) {
        if (type === 'hex' && prevType === 'percent') {
          // 百分比 → HEX
          const p = parseInt(val);
          if (!isNaN(p) && p >= 0 && p <= 100) {
            alphaInput.value = Math.round(p * 255 / 100).toString(16).toUpperCase().padStart(2, '0');
            return;
          }
        } else if (type === 'percent' && prevType === 'hex') {
          // HEX → 百分比
          if (/^[0-9A-F]{1,2}$/i.test(val)) {
            const hex = parseInt(val, 16);
            alphaInput.value = Math.round(hex / 255 * 100);
            return;
          }
        }
      }

      // 无有效值或首次加载 → 清空
      if (!val) {
        alphaInput.value = '';
      }
    }

    function calculateAlphaColor() {
      const baseColor = document.getElementById('baseColorInput').value.trim().toUpperCase();
      const alphaInput = document.getElementById('alphaInput').value.trim();

      if (!baseColor || !alphaInput) { alert('请输入色值和透明度'); return; }

      let hex = baseColor.startsWith('#') ? baseColor : '#' + baseColor;
      if (!/^#([0-9A-F]{6}|[0-9A-F]{8})$/i.test(hex)) {
        alert('无效的色值格式');
        return;
      }

      const r = parseInt(hex.substring(1, 3), 16);
      const g = parseInt(hex.substring(3, 5), 16);
      const b = parseInt(hex.substring(5, 7), 16);

      let alphaHex, percent;

      if (currentAlphaType === 'hex') {
        alphaHex = alphaInput.padStart(2, '0').toUpperCase();
        if (!/^[0-9A-F]{2}$/i.test(alphaHex)) {
          alert('16进制透明度应为 2 位字符（如 1A, FF）');
          return;
        }
        percent = Math.round((parseInt(alphaHex, 16) / 255) * 100);
      } else {
        const percentVal = parseInt(alphaInput);
        if (isNaN(percentVal) || percentVal < 0 || percentVal > 100) {
          alert('百分比应在 0-100 之间');
          return;
        }
        percent = percentVal;
        alphaHex = Math.round(percentVal * 255 / 100).toString(16).padStart(2, '0').toUpperCase();
      }

      const result = '#' + alphaHex + hex.substring(1);
      const resultUpper = result.toUpperCase();
      const a = parseInt(alphaHex, 16);

      document.getElementById('alphaColorPreview').style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
      document.getElementById('alphaColorHex').textContent = resultUpper;
      document.getElementById('alphaPercent').textContent = `不透明度: ${percent}%`;
      document.getElementById('alphaResult').style.display = 'block';

      currentColorResult = resultUpper;
    }

    function copyColorResult() {
      if (!currentColorResult) return;
      navigator.clipboard.writeText(currentColorResult).then(() => {
        showToast('色值已复制到剪贴板');
      });
    }

    // ========== JSON 工具 ==========
    let foldPairs = {};          // openLine -> closeLine
    let collapsedFolds = new Set();
    let isFoldViewActive = false;
    let beautifiedJsonText = '';

    function processJson(mode) {
      const inputEl = document.getElementById('jsonInput');
      const linedEditor = document.getElementById('jsonLinedEditor');
      const input = isLinedEditActive
        ? document.getElementById('jsonLinedTextarea').value.trim()
        : inputEl.value.trim();
      const errorEl = document.getElementById('jsonInputError');
      const statusEl = document.getElementById('jsonStatus');

      errorEl.style.display = 'none';
      statusEl.style.display = 'none';

      if (!input) {
        errorEl.textContent = '请输入 JSON 内容';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const parsed = JSON.parse(input);
        let result, msg;

        if (mode === 'beautify') {
          result = JSON.stringify(parsed, null, 2);
          msg = '✓ 已美化 — 点击 ▼ 折叠';

          inputEl.value = result;
          beautifiedJsonText = result;
          // 退出编辑模式进入折叠视图
          hideLinedEditor();
          showFoldView(result);
        } else {
          result = JSON.stringify(parsed);
          msg = `✓ 已压缩 (${new Blob([result]).size} 字节)`;

          // 如果在编辑模式，更新编辑区；否则更新 textarea
          if (isLinedEditActive) {
            document.getElementById('jsonLinedTextarea').value = result;
            updateLinedNumbers();
          } else {
            inputEl.value = result;
          }
          hideFoldView();
        }

        statusEl.textContent = msg;
        statusEl.style.color = '#28a745';
        statusEl.style.display = 'block';
      } catch (e) {
        const posMatch = e.message.match(/position\s+(\d+)/);
        let errMsg = 'JSON 解析错误: ' + e.message;
        if (posMatch && input.length > parseInt(posMatch[1])) {
          // position 指的是期望字符的位置，往前找到最后一个有意义的字符位置
          let pos = Math.max(0, parseInt(posMatch[1]) - 1);
          while (pos > 0 && /\s/.test(input[pos])) pos--;
          const actualLine = input.substring(0, pos + 1).split('\n').length;
          errMsg = `JSON 解析错误: 第 ${actualLine} 行 — ${e.message.replace(/at position \d+ \(line \d+ column \d+\)/, '').trim()}`;
        }
        errorEl.textContent = errMsg;
        errorEl.style.display = 'block';
      }
    }

    function showFoldView(jsonStr) {
      const foldView = document.getElementById('jsonFoldedView');
      const inputEl = document.getElementById('jsonInput');
      const linedEditor = document.getElementById('jsonLinedEditor');
      const editBtn = document.getElementById('btnEditFold');

      collapsedFolds.clear();
      foldPairs = findFoldPairs(jsonStr);
      isFoldViewActive = true;
      isLinedEditActive = false;

      foldView.innerHTML = buildFoldHtml(jsonStr);
      foldView.classList.add('active');
      inputEl.classList.add('hidden-by-fold');
      linedEditor.classList.remove('active');
      editBtn.style.display = 'inline-block';
      editBtn.textContent = '编辑';
      applyTheme();
    }

    function hideFoldView() {
      const foldView = document.getElementById('jsonFoldedView');
      const inputEl = document.getElementById('jsonInput');
      const editBtn = document.getElementById('btnEditFold');

      isFoldViewActive = false;
      collapsedFolds.clear();
      foldPairs = {};
      foldView.classList.remove('active');
      foldView.innerHTML = '';
      inputEl.classList.remove('hidden-by-fold');
      editBtn.style.display = 'none';
    }

    let isLinedEditActive = false;

    function showLinedEditor(text) {
      const linedEditor = document.getElementById('jsonLinedEditor');
      const linedTextarea = document.getElementById('jsonLinedTextarea');
      const editBtn = document.getElementById('btnEditFold');
      const inputEl = document.getElementById('jsonInput');

      linedTextarea.value = text;
      linedEditor.classList.add('active');
      inputEl.classList.add('hidden-by-fold');
      isLinedEditActive = true;
      editBtn.style.display = 'inline-block';
      editBtn.textContent = '折叠视图';
      updateLinedNumbers();
      applyTheme();
      linedTextarea.focus();
    }

    function hideLinedEditor() {
      const linedEditor = document.getElementById('jsonLinedEditor');
      linedEditor.classList.remove('active');
      isLinedEditActive = false;
    }

    function updateLinedNumbers() {
      const textarea = document.getElementById('jsonLinedTextarea');
      const numbersEl = document.getElementById('linedEditorNumbers');
      const lines = textarea.value.split('\n');
      let html = '';
      for (let i = 0; i < lines.length; i++) {
        html += `<span>${i + 1}</span>`;
      }
      numbersEl.innerHTML = html;
    }

    function syncLinedScroll() {
      const textarea = document.getElementById('jsonLinedTextarea');
      const numbersEl = document.getElementById('linedEditorNumbers');
      numbersEl.scrollTop = textarea.scrollTop;
    }

    // 初始化 lined editor 事件
    (function initLinedEditor() {
      const textarea = document.getElementById('jsonLinedTextarea');
      textarea.addEventListener('input', updateLinedNumbers);
      textarea.addEventListener('scroll', syncLinedScroll);
    })();

    function toggleEditMode() {
      const editBtn = document.getElementById('btnEditFold');

      if (isFoldViewActive) {
        // 折叠视图 → 编辑模式
        isFoldViewActive = false;
        const foldView = document.getElementById('jsonFoldedView');
        collapsedFolds.clear();
        foldPairs = {};
        foldView.classList.remove('active');
        foldView.innerHTML = '';
        showLinedEditor(beautifiedJsonText);
      } else if (isLinedEditActive) {
        // 编辑模式 → 折叠视图
        const linedTextarea = document.getElementById('jsonLinedTextarea');
        beautifiedJsonText = linedTextarea.value;
        try {
          JSON.parse(beautifiedJsonText);
          hideLinedEditor();
          showFoldView(beautifiedJsonText);
        } catch (e) {
          alert('JSON 格式无效，无法切换折叠视图');
        }
      }
    }

    function copyJsonInput() {
      let text;
      if (isLinedEditActive) {
        text = document.getElementById('jsonLinedTextarea').value.trim();
      } else if (isFoldViewActive) {
        text = beautifiedJsonText;
      } else {
        text = document.getElementById('jsonInput').value.trim();
      }
      if (!text) { showToast('没有可复制的内容'); return; }
      navigator.clipboard.writeText(text).then(() => {
        showToast('JSON 已复制到剪贴板');
      });
    }

    function toggleFullscreen() {
      const textarea = document.getElementById('jsonInput');
      const existing = document.querySelector('.fullscreen-overlay');
      
      if (existing) {
        // 退出全屏：把内容写回
        const fsTextarea = existing.querySelector('textarea');
        const content = fsTextarea.value;
        existing.remove();

        if (isLinedEditActive) {
          document.getElementById('jsonLinedTextarea').value = content;
          updateLinedNumbers();
        } else {
          textarea.value = content;
        }

        if (isFoldViewActive) {
          beautifiedJsonText = content;
          try {
            JSON.parse(beautifiedJsonText);
            showFoldView(beautifiedJsonText);
          } catch (e) {
            hideFoldView();
          }
        }
        textarea.focus();
        return;
      }

      // 进入全屏
      let currentText;
      if (isLinedEditActive) {
        currentText = document.getElementById('jsonLinedTextarea').value;
      } else if (isFoldViewActive) {
        currentText = beautifiedJsonText;
      } else {
        currentText = textarea.value;
      }

      const overlay = document.createElement('div');
      overlay.className = 'fullscreen-overlay' + (jsonTheme === 'dark' ? ' theme-dark' : '');
      overlay.innerHTML = `
        <div class="fullscreen-header">
          <span>📋 JSON 全屏编辑</span>
          <button class="fullscreen-close" onclick="toggleFullscreen()">&times;</button>
        </div>
        <textarea>${escapeHtml(currentText)}</textarea>
      `;
      document.body.appendChild(overlay);

      const fsTextarea = overlay.querySelector('textarea');
      fsTextarea.focus();

      const escHandler = (e) => {
        if (e.key === 'Escape') { toggleFullscreen(); }
      };
      document.addEventListener('keydown', escHandler, { once: true });
    }

    function clearJson() {
      hideFoldView();
      hideLinedEditor();
      document.getElementById('jsonInput').value = '';
      document.getElementById('jsonLinedTextarea').value = '';
      updateLinedNumbers();
      document.getElementById('jsonInputError').style.display = 'none';
      document.getElementById('jsonStatus').style.display = 'none';
      beautifiedJsonText = '';
      isLinedEditActive = false;
    }

    function findFoldPairs(jsonStr) {
      const lines = jsonStr.split('\n');

      // 构建每行的起始字符位置映射
      const lineStarts = [];
      let pos = 0;
      for (let i = 0; i < lines.length; i++) {
        lineStarts.push(pos);
        pos += lines[i].length + 1; // +1 for \n
      }

      function lineForCharPos(charPos) {
        // 二分查找
        let lo = 0, hi = lineStarts.length - 1;
        while (lo < hi) {
          const mid = Math.ceil((lo + hi) / 2);
          if (lineStarts[mid] <= charPos) lo = mid;
          else hi = mid - 1;
        }
        return lo;
      }

      const stack = [];   // { char: '{'|'[', pos: number }
      const pairs = {};   // openLine -> closeLine

      for (let i = 0; i < jsonStr.length; i++) {
        const ch = jsonStr[i];
        if (ch === '{' || ch === '[') {
          stack.push({ char: ch, pos: i });
        } else if (ch === '}' || ch === ']') {
          if (stack.length === 0) continue;
          const opener = stack.pop();
          if ((opener.char === '{' && ch === '}') || (opener.char === '[' && ch === ']')) {
            const openLine = lineForCharPos(opener.pos);
            const closeLine = lineForCharPos(i);
            if (openLine !== closeLine) {
              pairs[openLine] = closeLine;
            }
          }
        }
      }

      return pairs;
    }

    function buildFoldHtml(jsonStr) {
      const lines = jsonStr.split('\n');
      let html = '';

      for (let i = 0; i < lines.length; i++) {
        const isFoldable = foldPairs[i] !== undefined;
        const hidden = isLineHiddenByFold(i);

        html += `<div class="json-fold-line${hidden ? ' hidden' : ''}${isFoldable ? ' foldable' : ''}" data-line="${i}">`;
        html += `<span class="json-fold-line-num">${i + 1}</span>`;
        html += `<span class="json-fold-toggle${isFoldable ? ' can-fold' : ''}" data-open="${i}">▼</span>`;
        html += `<span class="json-fold-content">${escapeHtml(lines[i])}</span>`;
        html += `</div>`;
      }

      return html;
    }

    function isLineHiddenByFold(lineIndex) {
      for (const openLine of collapsedFolds) {
        const closeLine = foldPairs[openLine];
        if (lineIndex > openLine && lineIndex <= closeLine) {
          return true;
        }
      }
      return false;
    }

    // 委托点击事件到 fold view
    document.addEventListener('click', function(e) {
      const toggle = e.target.closest('.json-fold-toggle.can-fold');
      if (!toggle) return;

      const openLine = parseInt(toggle.dataset.open);
      const closeLine = foldPairs[openLine];
      if (closeLine === undefined) return;

      const isCollapsed = collapsedFolds.has(openLine);

      if (isCollapsed) {
        // 展开
        collapsedFolds.delete(openLine);
        toggle.textContent = '▼';
      } else {
        // 折叠
        collapsedFolds.add(openLine);
        toggle.textContent = '▶';
      }

      // 更新受影响范围内所有行的可见性
      const foldView = document.getElementById('jsonFoldedView');
      for (let i = openLine + 1; i <= closeLine; i++) {
        const lineEl = foldView.querySelector(`.json-fold-line[data-line="${i}"]`);
        if (!lineEl) continue;
        const hidden = isLineHiddenByFold(i);
        lineEl.classList.toggle('hidden', hidden);
        // 同步内部折叠图标的文字
        const innerToggle = lineEl.querySelector('.json-fold-toggle.can-fold');
        if (innerToggle && !hidden) {
          const innerOpen = parseInt(innerToggle.dataset.open);
          innerToggle.textContent = collapsedFolds.has(innerOpen) ? '▶' : '▼';
        }
      }
    });

    // ========== JSON 主题切换 ==========
    let jsonTheme = 'light';  // 'light' | 'dark'

    function applyTheme() {
      const isDark = jsonTheme === 'dark';
      const foldView = document.getElementById('jsonFoldedView');
      const linedEditor = document.getElementById('jsonLinedEditor');
      const jsonInput = document.getElementById('jsonInput');
      const themeBtn = document.getElementById('jsonThemeBtn');

      foldView.classList.toggle('theme-dark', isDark);
      linedEditor.classList.toggle('theme-dark', isDark);
      jsonInput.classList.toggle('theme-dark', isDark);
      themeBtn.textContent = isDark ? '🌙' : '☀️';
      themeBtn.title = isDark ? '切换亮色主题' : '切换暗色主题';

      // 全屏 overlay 也要响应主题
      const fsOverlay = document.querySelector('.fullscreen-overlay');
      if (fsOverlay) {
        fsOverlay.classList.toggle('theme-dark', isDark);
      }

      try { localStorage.setItem('jsonTheme', jsonTheme); } catch(e) {}
    }

    function toggleJsonTheme() {
      jsonTheme = jsonTheme === 'light' ? 'dark' : 'light';
      applyTheme();
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ========== 通用 ==========
    function copyTimestamp() {
      const ts = document.getElementById('currentTimestamp').textContent;
      if (ts === '-') return;
      navigator.clipboard.writeText(ts).then(() => {
        showToast('时间戳已复制: ' + ts);
      });
    }

    function copyResult(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板');
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 初始化
    updateCurrentTime();
    setInterval(updateCurrentTime, 1000);
    switchAlphaType('hex');

    applyTheme();
  </script>
</body>
</html>
