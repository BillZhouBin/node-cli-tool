<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开发者工具箱</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 导航栏 */
    .nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 6px;
    }

    .nav-btn {
      flex: 1;
      max-width: 200px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.85);
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .nav-btn.active {
      background: #fff;
      color: #667eea;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    /* 卡片 */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .card h2 {
      color: #333;
      margin-bottom: 24px;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      color: #555;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      min-height: 150px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 14px;
      line-height: 1.5;
      resize: vertical;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      padding: 11px 24px;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-toggle {
      background: #e9ecef;
      color: #666;
    }

    .btn-toggle:hover {
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }

    .btn-toggle.active {
      background: #28a745;
      color: #fff;
      box-shadow: 0 3px 15px rgba(40, 167, 69, 0.4);
    }

    .btn.active {
      background: #28a745;
      box-shadow: 0 3px 15px rgba(40, 167, 69, 0.4);
    }

    .btn-secondary {
      background: #6c757d;
    }

    .btn-secondary:hover {
      box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 10px;
      border-left: 4px solid #667eea;
    }

    .result-label {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .result-value {
      color: #333;
      font-size: 1.2rem;
      font-weight: 600;
      word-break: break-all;
    }

    .copy-btn {
      background: #28a745;
      padding: 11px 24px;
      border-radius: 10px;
    }

    .result > .copy-btn {
      margin-top: 10px;
    }

    .copy-btn:hover {
      box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
    }

    /* 当前时间 */
    .current-time {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .current-time .time-label {
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
    }

    .current-time .time-value {
      color: #fff;
      font-size: 2rem;
      font-weight: bold;
      margin: 8px 0;
    }

    .current-time .date-value {
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.6rem;
      }

      .nav {
        flex-wrap: wrap;
      }

      .nav-btn {
        max-width: none;
        flex: 1 1 30%;
        font-size: 0.85rem;
        padding: 10px 14px;
      }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* 分隔线 */
    hr.divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 20px 0;
    }

    .json-error {
      color: #dc3545;
      font-size: 0.9rem;
    }

    /* ===== JSON 统一编辑器（编辑+折叠融合） ===== */
    .json-editor {
      flex: 1;
      min-height: 0;
      background: #fafafa;
      border: 2px solid #ddd;
      border-radius: 10px;
      overflow: auto;
      font-family: 'Monaco','Menlo','Ubuntu Mono',monospace;
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      position: relative;
      transition: border-color 0.3s;
    }

    .json-editor:focus-within {
      border-color: #667eea;
    }

    .json-editor-lines {
      min-height: 100%;
    }

    .json-editor-line {
      display: flex;
      align-items: baseline;
      min-height: 1.6em;
      white-space: pre;
    }

    .json-editor-line.hidden {
      display: none;
    }

    /* 行号列 */
    .json-editor-gutter {
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      width: 68px;
      background: #f0f0f0;
      border-right: 1px solid #e0e0e0;
      user-select: none;
      padding-right: 8px;
      box-sizing: border-box;
    }

    .json-editor-line-num {
      display: inline-block;
      min-width: 28px;
      text-align: right;
      padding-right: 6px;
      color: #999;
      font-size: 12px;
      line-height: 1.6;
      flex-shrink: 0;
    }

    /* 折叠箭头 */
    .json-editor-fold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 1.6em;
      cursor: default;
      color: #bbb;
      font-size: 11px;
      flex-shrink: 0;
      transition: transform 0.15s, color 0.15s, background 0.15s;
      border-radius: 3px;
      visibility: hidden;
    }

    .json-editor-fold.can-fold {
      visibility: visible;
      cursor: pointer;
      color: #888;
    }

    .json-editor-fold.can-fold:hover {
      color: #333;
      background: rgba(0,0,0,0.06);
    }

    .json-editor-fold.can-fold.collapsed {
      transform: rotate(-90deg);
    }

    /* 可编辑内容区 */
    .json-editor-content {
      flex: 1;
      min-width: 0;
      outline: none;
      padding: 0 12px;
      white-space: pre;
      caret-color: #333;
      overflow-wrap: normal;
    }

    .json-editor-content:focus {
      background: rgba(102,126,234,0.06);
    }

    .json-editor-content::selection {
      background: rgba(102,126,234,0.25);
    }

    .json-editor-placeholder {
      color: #aaa;
    }

    /* 折叠后提示文字 */
    .json-editor-collapsed-hint {
      color: #6a9955;
      margin-left: 20px;
      font-style: italic;
    }

    /* 折叠占位行 */
    .json-editor-collapsed-line .json-editor-content {
      background: rgba(106, 153, 85, 0.06);
      border-radius: 0 4px 4px 0;
    }

    .json-editor-collapsed-line .json-editor-content::after {
      content: attr(data-hint);
      color: #6a9955;
      font-style: italic;
      margin-left: 12px;
      opacity: 0.85;
    }

    /* 暗色主题 */
    .json-editor.theme-dark {
      background: #1e1e1e;
      border-color: #333;
      color: #d4d4d4;
    }

    .json-editor.theme-dark:focus-within {
      border-color: #667eea;
    }

    .json-editor.theme-dark .json-editor-gutter {
      background: #1a1a1a;
      border-right-color: #333;
    }

    .json-editor.theme-dark .json-editor-line-num {
      color: #555;
    }

    .json-editor.theme-dark .json-editor-fold.can-fold {
      color: #999;
    }

    .json-editor.theme-dark .json-editor-fold.can-fold:hover {
      color: #ccc;
      background: rgba(255,255,255,0.1);
    }

    .json-editor.theme-dark .json-editor-collapsed-line .json-editor-content {
      background: rgba(106, 153, 85, 0.1);
    }

    .json-editor.theme-dark .json-editor-collapsed-line .json-editor-content::after {
      color: #7aa868;
    }

    .json-editor.theme-dark .json-editor-content {
      caret-color: #fff;
    }

    .json-editor.theme-dark .json-editor-content:focus {
      background: rgba(102,126,234,0.12);
    }

    .json-editor.theme-dark .json-editor-content::selection {
      background: rgba(102,126,234,0.3);
    }

    /* 移除旧版 JSON 视图样式 */
    .json-fold-view,
    .lined-editor,
    #jsonInput {
      display: none;
    }

    /* 主题切换按钮 */
    .theme-toggle-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      padding: 3px 8px;
      font-size: 0.95rem;
      color: #888;
      transition: all 0.2s;
      vertical-align: middle;
      margin-left: 4px;
      line-height: 1;
    }

    .theme-toggle-btn:hover {
      color: #333;
      border-color: #aaa;
    }

    /* ===== 全屏 overlay 亮色默认 + 暗色主题 ===== */
    .fullscreen-overlay {
      background: #fafafa;
    }

    .fullscreen-overlay .fullscreen-header {
      color: #333;
    }

    .fullscreen-overlay .fullscreen-close {
      color: #666;
    }

    .fullscreen-overlay .fullscreen-close:hover { color: #333; }

    .fullscreen-overlay.theme-dark {
      background: #1e1e1e;
    }

    .fullscreen-overlay.theme-dark .fullscreen-header {
      color: #d4d4d4;
    }

    .fullscreen-overlay.theme-dark .fullscreen-close {
      color: #aaa;
    }

    .fullscreen-overlay.theme-dark .fullscreen-close:hover { color: #d4d4d4; }

    /* 全屏下的编辑器样式调整 */
    .fullscreen-overlay .json-editor {
      border-radius: 10px;
      flex: 1;
      min-height: 0;
    }

    /* JSON 面板撑满视口 */
    #panel-json.active {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 220px);
      min-height: 400px;
    }

    #panel-json.active .card {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #panel-json .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #panel-json .card-body .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* 全屏 */
    .fullscreen-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      padding: 15px 25px;
    }



    .fullscreen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 1rem;
      font-weight: 600;
    }

    .fullscreen-close {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      padding: 0 8px;
      line-height: 1;
    }

    .fullscreen-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      padding: 4px 10px;
      font-size: 1.1rem;
      color: #888;
      transition: color 0.2s, border-color 0.2s;
      vertical-align: middle;
      margin-left: 8px;
    }

    .fullscreen-btn:hover {
      color: #333;
      border-color: #aaa;
    }

    /* 隐藏面板 */
    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* 时间转换内部的两列卡片 */
    .time-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    /* ===== Markdown 预览 ===== */
    .md-container {
      display: flex;
      gap: 16px;
      height: calc(100vh - 350px);
      min-height: 420px;
    }

    .md-editor-pane,
    .md-preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .md-pane-label {
      font-size: 0.8rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .md-textarea {
      flex: 1;
      min-height: 0;
      width: 100%;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Monaco','Menlo','Ubuntu Mono',monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      transition: border-color 0.3s;
      background: #fafafa;
    }

    .md-textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .md-preview {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: #fff;
      color: #333;
      font-size: 15px;
      line-height: 1.75;
    }

    .md-preview h1 { font-size: 1.8em; margin: 0.6em 0 0.3em; padding-bottom: 0.3em; border-bottom: 1px solid #e0e0e0; }
    .md-preview h2 { font-size: 1.5em; margin: 0.8em 0 0.3em; padding-bottom: 0.25em; border-bottom: 1px solid #eee; }
    .md-preview h3 { font-size: 1.25em; margin: 0.7em 0 0.2em; }
    .md-preview h4 { font-size: 1.1em; margin: 0.6em 0 0.15em; }
    .md-preview h5, .md-preview h6 { font-size: 1em; margin: 0.5em 0 0.1em; }
    .md-preview p { margin: 0.5em 0; }
    .md-preview ul, .md-preview ol { padding-left: 1.8em; margin: 0.5em 0; }
    .md-preview li { margin: 0.2em 0; }
    .md-preview blockquote {
      margin: 0.8em 0;
      padding: 4px 16px;
      border-left: 4px solid #667eea;
      background: #f5f7ff;
      color: #555;
    }
    .md-preview code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco','Menlo','Ubuntu Mono',monospace;
      font-size: 0.9em;
      color: #d63384;
    }
    .md-preview pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 0.8em 0;
      line-height: 1.5;
      font-size: 13px;
    }
    .md-preview pre code {
      background: none;
      color: #d4d4d4;
      padding: 0;
      font-size: inherit;
    }
    .md-preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.8em 0;
    }
    .md-preview th, .md-preview td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }
    .md-preview th {
      background: #f5f7ff;
      font-weight: 600;
    }
    .md-preview img { max-width: 100%; border-radius: 6px; margin: 0.5em 0; }
    .md-preview a { color: #667eea; text-decoration: none; }
    .md-preview a:hover { text-decoration: underline; }
    .md-preview hr { border: none; border-top: 2px solid #e0e0e0; margin: 1.2em 0; }

    @media (max-width: 768px) {
      .md-container {
        flex-direction: column;
        height: auto;
        min-height: 600px;
      }
      .md-editor-pane, .md-preview-pane {
        flex: none;
        height: 300px;
      }
    }

    /* MD 全屏预览 */
    .md-fullscreen-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .md-fullscreen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      flex-shrink: 0;
    }

    .md-fullscreen-close {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: #888;
      padding: 0 8px;
      line-height: 1;
      transition: color 0.2s;
    }

    .md-fullscreen-close:hover { color: #333; }

    .md-fullscreen-preview {
      flex: 1;
      overflow-y: auto;
      padding: 30px 40px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      font-size: 16px;
      line-height: 1.85;
      color: #333;
    }

    .md-fullscreen-preview h1 { font-size: 2em; margin: 0.6em 0 0.3em; padding-bottom: 0.3em; border-bottom: 1px solid #e0e0e0; }
    .md-fullscreen-preview h2 { font-size: 1.6em; margin: 0.8em 0 0.3em; padding-bottom: 0.25em; border-bottom: 1px solid #eee; }
    .md-fullscreen-preview h3 { font-size: 1.3em; margin: 0.7em 0 0.2em; }
    .md-fullscreen-preview h4 { font-size: 1.15em; margin: 0.6em 0 0.15em; }
    .md-fullscreen-preview h5, .md-fullscreen-preview h6 { font-size: 1em; margin: 0.5em 0 0.1em; }
    .md-fullscreen-preview p { margin: 0.6em 0; }
    .md-fullscreen-preview ul, .md-fullscreen-preview ol { padding-left: 2em; margin: 0.6em 0; }
    .md-fullscreen-preview li { margin: 0.3em 0; }
    .md-fullscreen-preview blockquote {
      margin: 1em 0;
      padding: 8px 20px;
      border-left: 4px solid #667eea;
      background: #f5f7ff;
      color: #555;
    }
    .md-fullscreen-preview code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco','Menlo','Ubuntu Mono',monospace;
      font-size: 0.9em;
      color: #d63384;
    }
    .md-fullscreen-preview pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 1em 0;
      line-height: 1.5;
      font-size: 14px;
    }
    .md-fullscreen-preview pre code {
      background: none;
      color: #d4d4d4;
      padding: 0;
      font-size: inherit;
    }
    .md-fullscreen-preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }
    .md-fullscreen-preview th, .md-fullscreen-preview td {
      border: 1px solid #ddd;
      padding: 10px 14px;
      text-align: left;
    }
    .md-fullscreen-preview th {
      background: #f5f7ff;
      font-weight: 600;
    }
    .md-fullscreen-preview img { max-width: 100%; border-radius: 8px; margin: 0.8em 0; }
    .md-fullscreen-preview a { color: #667eea; text-decoration: none; }
    .md-fullscreen-preview a:hover { text-decoration: underline; }
    .md-fullscreen-preview hr { border: none; border-top: 2px solid #e0e0e0; margin: 1.5em 0; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 当前时间 -->
    <div class="current-time">
      <div class="time-label">当前 Unix 时间戳（点击复制）</div>
      <div class="time-value" id="currentTimestamp" onclick="copyTimestamp()" title="点击复制" style="cursor:pointer;">-</div>
      <div class="date-value" id="currentDate">-</div>
    </div>

    <!-- 导航栏 -->
    <nav class="nav">
      <button class="nav-btn active" onclick="switchTool('time')" id="nav-time">⏰ 时间转换</button>
      <button class="nav-btn" onclick="switchTool('color')" id="nav-color">🎨 颜色工具</button>

  <script>
    // ========== 面板切换 ==========
    function switchTool(tool) {
      // 切换导航按钮状态
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('nav-' + tool).classList.add('active');

      // 切换面板显示
      document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
      document.getElementById('panel-' + tool).classList.add('active');
    }

    // ========== 时间工具 ==========
    function updateCurrentTime() {
      const now = Date.now();
      const date = new Date(now);
      document.getElementById('currentTimestamp').textContent = now;
      document.getElementById('currentDate').textContent = formatDate(date, 'YYYY-MM-DD HH:mm:ss');
    }

    function formatDate(date, format) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const seconds = String(date.getSeconds()).padStart(2, '0');

      return format
        .replace('YYYY', year)
        .replace('MM', month)
        .replace('DD', day)
        .replace('HH', hours)
        .replace('mm', minutes)
        .replace('ss', seconds);
    }

    function parseTimestamp(input) {
      const ts = parseInt(input.trim());
      if (isNaN(ts)) return null;
      return ts.toString().length <= 10 ? ts * 1000 : ts;
    }

    function parseDate(dateStr) {
      const s = dateStr.trim();

      // 纯数字 → 当作时间戳
      if (/^\d+$/.test(s)) {
        const ts = parseInt(s);
        if (ts > 0) {
          return s.length <= 10 ? ts * 1000 : ts;
        }
      }

      // 先用正则匹配标准日期格式（确保本地时间解析正确）
      const patterns = [
        /^(\d{4})-(\d{1,2})-(\d{1,2})(?:\s+(\d{1,2}):(\d{1,2}):(\d{1,2}))?$/,
        /^(\d{4})\/(\d{1,2})\/(\d{1,2})(?:\s+(\d{1,2}):(\d{1,2}):(\d{1,2}))?$/
      ];
      for (const p of patterns) {
        const m = s.match(p);
        if (m) {
          return new Date(
            parseInt(m[1]), parseInt(m[2]) - 1,
            parseInt(m[3]),
            m[4] ? parseInt(m[4]) : 0,
            m[5] ? parseInt(m[5]) : 0,
            m[6] ? parseInt(m[6]) : 0
          ).getTime();
        }
      }

      // 最后尝试浏览器原生解析
      const date = new Date(s);
      return isNaN(date.getTime()) ? null : date.getTime();
    }

    // 构建所有时区选项：UTC-12 到 UTC+14
    function buildTimezoneOptions() {

        { label: 'UTC-07:00 丹佛/凤凰城',  offset: -420 },
        { label: 'UTC-06:00 芝加哥/墨西哥城', offset: -360 },
        { label: 'UTC-05:00 纽约/多伦多',   offset: -300 },
        { label: 'UTC-04:00 圣地亚哥',      offset: -240 },
        { label: 'UTC-03:00 布宜诺斯艾利斯/圣保罗', offset: -180 },
        { label: 'UTC-02:00',            offset: -120 },
        { label: 'UTC-01:00 亚速尔',      offset: -60 },
        { label: 'UTC+00:00 伦敦/都柏林',  offset: 0 },

        { label: 'UTC+05:30 孟买/科伦坡',   offset: 330 },

        { label: 'UTC+08:00 北京/上海/香港/新加坡', offset: 480 },
        { label: 'UTC+08:45 尤克拉',        offset: 525 },
        { label: 'UTC+09:00 东京/首尔',      offset: 540 },
        { label: 'UTC+09:30 阿德莱德/达尔文', offset: 570 },
        { label: 'UTC+10:00 悉尼/墨尔本',    offset: 600 },
        { label: 'UTC+10:30 豪勋爵岛',       offset: 630 },
        { label: 'UTC+11:00 所罗门群岛',     offset: 660 },
        { label: 'UTC+12:00 奥克兰/斐济',    offset: 720 },
        { label: 'UTC+12:45 查塔姆群岛',     offset: 765 },
        { label: 'UTC+13:00 汤加/萨摩亚',    offset: 780 },
        { label: 'UTC+14:00 莱恩群岛',       offset: 840 },
      ];

      const html = popular.map(({ label, offset }) => {
        return `<option value="${offset}">${label}</option>`;
      }).join('');

      // 本地时区偏移（分钟）
      const localOffset = -new Date().getTimezoneOffset();
      const localLabel = `UTC${localOffset >= 0 ? '+' : ''}${formatOffset(localOffset)} (本地时区)`;
      const localOption = `<option value="${localOffset}" selected>${localLabel}</option>`;

      return { optionsHtml: localOption + html, localOffset };
    }

    function formatOffset(totalMinutes) {
      const sign = totalMinutes >= 0 ? '+' : '-';
      const abs = Math.abs(totalMinutes);
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      if (m === 0) return `${sign}${String(h).padStart(2, '0')}:00`;
      return `${sign}${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function convertTsToDate() {
      const input = document.getElementById('tsInput').value;
      const tzOffset = parseInt(document.getElementById('tsTimezone').value);
      const format = document.getElementById('tsFormat').value || 'YYYY-MM-DD HH:mm:ss';

      if (!input) { alert('请输入时间戳'); return; }

      const ts = parseTimestamp(input);
      if (ts === null) { alert('无效的时间戳格式'); return; }

      // 通过 UTC 时间 + 时区偏移来计算目标时区的时间
      const utcDate = new Date(ts);
      const targetDate = new Date(utcDate.getTime() + tzOffset * 60 * 1000);
      const result = formatDate(targetDate, format);

      document.getElementById('tsResultValue').textContent = result;
      document.getElementById('tsResult').style.display = 'block';
    }

    function convertDateToTs() {
      const input = document.getElementById('dateInput').value;
      const tzOffset = parseInt(document.getElementById('dateTimezone').value);
      const unit = document.getElementById('dateUnit').value;

      if (!input) { alert('请输入日期'); return; }

      // 先用本地时区解析日期，得到本地时间对应的时间戳
      const localTs = parseDate(input);
      if (localTs === null) { alert('无效的日期格式'); return; }

      // 获取本地时区偏移（分钟）
      const localOffset = -new Date().getTimezoneOffset();
      // 转换为目标时区的时间戳
      const targetTs = localTs - (tzOffset - localOffset) * 60 * 1000;

      const result = unit === 'seconds' ? Math.floor(targetTs / 1000) : targetTs;
      document.getElementById('dateResultValue').textContent = result;
      document.getElementById('dateResult').style.display = 'block';
    }

    function useCurrentTimestamp() {
      document.getElementById('tsInput').value = Math.floor(Date.now() / 1000);
      convertTsToDate();
    }

    function useCurrentDate() {
      document.getElementById('dateInput').value = formatDate(new Date(), 'YYYY-MM-DD HH:mm:ss');
    }

    function calculateDiff() {
      const start = document.getElementById('startTime').value.trim();
      const end = document.getElementById('endTime').value.trim();

      if (!start || !end) { alert('请输入开始和结束时间'); return; }

      const startTs = parseDate(start);
      const endTs = parseDate(end);

      if (startTs === null || endTs === null) { alert('时间格式无效'); return; }

      // 格式化解析后的日期时间，没填时间部分默认显示 00:00:00
      const startDate = new Date(startTs);
      const endDate = new Date(endTs);
      const startStr = formatDate(startDate, 'YYYY-MM-DD HH:mm:ss');
      const endStr = formatDate(endDate, 'YYYY-MM-DD HH:mm:ss');

      const diff = Math.abs(endTs - startTs);
      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      const remainHours = hours - days * 24;
      const remainMinutes = minutes - hours * 60;
      const remainSeconds = seconds - minutes * 60;

      let timePart = `${days} 天`;
      if (remainHours > 0 || remainMinutes > 0 || remainSeconds > 0) {
        timePart += ` ${String(remainHours).padStart(2, '0')}:${String(remainMinutes).padStart(2, '0')}:${String(remainSeconds).padStart(2, '0')}`;
      }

      const result = `<span style="color:#888;font-size:0.9rem;">${escapeHtml(startStr)} → ${escapeHtml(endStr)}</span><br>
相差 ${diff} 毫秒 = ${seconds} 秒 = ${minutes} 分钟 = ${hours} 小时 = ${timePart}<br>
<span style="color:#667eea;font-weight:600;">${days} 天 ${String(remainHours).padStart(2, '0')} 时 ${String(remainMinutes).padStart(2, '0')} 分 ${String(remainSeconds).padStart(2, '0')} 秒</span>`;
      document.getElementById('diffResultValue').innerHTML = result.replace(/ = /g, '<br>= ');
      document.getElementById('diffResult').style.display = 'block';
    }

    // ========== 颜色工具 ==========
    let currentColorResult = '';
    let currentAlphaType = 'hex';

    function parseColor() {
      const input = document.getElementById('colorInput').value.trim();
      if (!input) { alert('请输入色值'); return; }

      let hex = input;
      if (input.toLowerCase().startsWith('0x')) {
        hex = '#' + input.substring(2);
      }
      hex = hex.toUpperCase();

      if (!/^#([0-9A-F]{6}|[0-9A-F]{8})$/i.test(hex)) {
        alert('无效的色值格式，请输入 6 位或 8 位十六进制颜色值');
        return;
      }

      let r, g, b, a;
      if (hex.length === 9) {
        a = parseInt(hex.substring(1, 3), 16);
        r = parseInt(hex.substring(3, 5), 16);
        g = parseInt(hex.substring(5, 7), 16);
        b = parseInt(hex.substring(7, 9), 16);
      } else {
        a = 255;
        r = parseInt(hex.substring(1, 3), 16);
        g = parseInt(hex.substring(3, 5), 16);
        b = parseInt(hex.substring(5, 7), 16);
      }

      document.getElementById('colorPreview').style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
      document.getElementById('colorHexValue').textContent = hex;
      document.getElementById('colorRgbaValue').textContent = `RGBA(${r}, ${g}, ${b}, ${(a / 255).toFixed(2)}) | 不透明度: ${Math.round(a / 255 * 100)}%`;
      document.getElementById('colorParseResult').style.display = 'block';
      currentColorResult = hex;
    }

    function switchAlphaType(type) {
      const prevType = currentAlphaType;
      currentAlphaType = type;
      const alphaInput = document.getElementById('alphaInput');
      const btnHex = document.getElementById('btn-hex');
      const btnPercent = document.getElementById('btn-percent');

      btnHex.classList.toggle('active', type === 'hex');
      btnPercent.classList.toggle('active', type === 'percent');

      alphaInput.placeholder = type === 'hex' ? '1A' : '10';

      // 如果用户已输入有效值，切换时自动转换
      const val = alphaInput.value.trim();
      if (val && prevType !== type) {
        if (type === 'hex' && prevType === 'percent') {
          // 百分比 → HEX
          const p = parseInt(val);
          if (!isNaN(p) && p >= 0 && p <= 100) {
            alphaInput.value = Math.round(p * 255 / 100).toString(16).toUpperCase().padStart(2, '0');
            return;
          }
        } else if (type === 'percent' && prevType === 'hex') {
          // HEX → 百分比
          if (/^[0-9A-F]{1,2}$/i.test(val)) {
            const hex = parseInt(val, 16);
            alphaInput.value = Math.round(hex / 255 * 100);
            return;
          }
        }
      }

      // 无有效值或首次加载 → 清空
      if (!val) {
        alphaInput.value = '';
      }
    }

    function calculateAlphaColor() {
      const baseColor = document.getElementById('baseColorInput').value.trim().toUpperCase();
      const alphaInput = document.getElementById('alphaInput').value.trim();

      if (!baseColor || !alphaInput) { alert('请输入色值和透明度'); return; }

      let hex = baseColor.startsWith('#') ? baseColor : '#' + baseColor;
      if (!/^#([0-9A-F]{6}|[0-9A-F]{8})$/i.test(hex)) {
        alert('无效的色值格式');
        return;
      }

      const r = parseInt(hex.substring(1, 3), 16);
      const g = parseInt(hex.substring(3, 5), 16);
      const b = parseInt(hex.substring(5, 7), 16);

      let alphaHex, percent;

      if (currentAlphaType === 'hex') {
        alphaHex = alphaInput.padStart(2, '0').toUpperCase();
        if (!/^[0-9A-F]{2}$/i.test(alphaHex)) {
          alert('16进制透明度应为 2 位字符（如 1A, FF）');
          return;
        }
        percent = Math.round((parseInt(alphaHex, 16) / 255) * 100);
      } else {
        const percentVal = parseInt(alphaInput);
        if (isNaN(percentVal) || percentVal < 0 || percentVal > 100) {
          alert('百分比应在 0-100 之间');
          return;
        }
        percent = percentVal;
        alphaHex = Math.round(percentVal * 255 / 100).toString(16).padStart(2, '0').toUpperCase();
      }

      const result = '#' + alphaHex + hex.substring(1);
      const resultUpper = result.toUpperCase();
      const a = parseInt(alphaHex, 16);

      document.getElementById('alphaColorPreview').style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${a / 255})`;
      document.getElementById('alphaColorHex').textContent = resultUpper;
      document.getElementById('alphaPercent').textContent = `不透明度: ${percent}%`;
      document.getElementById('alphaResult').style.display = 'block';

      currentColorResult = resultUpper;
    }

    function copyColorResult() {
      if (!currentColorResult) return;
      navigator.clipboard.writeText(currentColorResult).then(() => {
        showToast('色值已复制到剪贴板');
      });
    }

    // ========== JSON 工具 ==========
    // 状态
    let jsonLines = [];              // 当前每行的文本内容
    let foldPairs = {};              // openLine -> closeLine
    let collapsedFolds = new Set();  // 已折叠的行号集合
    let activeLineEl = null;         // 当前获得焦点的行元素

    // 获取编辑器全部文本
    function getJsonText() {
      return jsonLines.join('\n');
    }

    // 从 contenteditable 行读取最新文本
    function syncLineFromDOM(lineIndex) {
      const lineEl = document.getElementById('json-line-' + lineIndex);
      if (!lineEl) return;
      const contentEl = lineEl.querySelector('.json-editor-content');
      if (contentEl) {
        jsonLines[lineIndex] = contentEl.textContent || '';
      }
    }

    function syncAllLinesFromDOM() {
      const linesEl = document.getElementById('jsonEditorLines');
      if (!linesEl) return;
      const lineEls = linesEl.querySelectorAll('.json-editor-line');
      lineEls.forEach(el => {
        const idx = parseInt(el.dataset.line);
        const contentEl = el.querySelector('.json-editor-content');
        if (contentEl && !isNaN(idx)) {
          jsonLines[idx] = contentEl.textContent || '';
        }
      });
    }

    // 重建整个编辑器（保留折叠状态）
    function renderEditor() {
      const linesEl = document.getElementById('jsonEditorLines');
      if (!linesEl) return;

      foldPairs = findFoldPairs(jsonLines.join('\n'));
      let html = '';
      for (let i = 0; i < jsonLines.length; i++) {
        const isFoldable = foldPairs[i] !== undefined;
        const hidden = isLineHiddenByFold(i);
        html += buildLineHtml(i, jsonLines[i], isFoldable, hidden);
      }
      linesEl.innerHTML = html;
    }

    function buildLineHtml(lineIndex, text, isFoldable, hidden, idPrefix) {
      const prefix = idPrefix || 'json-line-';
      const isCollapsed = collapsedFolds.has(lineIndex);
      // 检查是否是折叠的起始行（需要显示折叠占位信息）
      const closeLine = foldPairs[lineIndex];
      const showCollapsedHint = isCollapsed && closeLine !== undefined && closeLine > lineIndex + 1;
      const foldedCount = showCollapsedHint ? (closeLine - lineIndex) : 0;
      
      const foldSymbol = isCollapsed ? '▶' : '▼';
      const canFold = isFoldable ? ' can-fold' : '';
      const collapsedClass = isCollapsed ? ' collapsed' : '';
      const hiddenClass = hidden ? ' hidden' : '';
      const collapsedLineClass = (isCollapsed && isFoldable) ? ' json-editor-collapsed-line' : '';
      const escaped = escapeHtml(text);
      const dataHint = showCollapsedHint ? ` data-hint="// ... ${foldedCount} 行已折叠"` : '';
      return `<div class="json-editor-line${hiddenClass}${collapsedLineClass}" data-line="${lineIndex}" id="${prefix}${lineIndex}">
        <div class="json-editor-gutter">
          <span class="json-editor-line-num">${lineIndex + 1}</span>
          <span class="json-editor-fold${canFold}${collapsedClass}" data-open="${lineIndex}">${foldSymbol}</span>
        </div>
        <div class="json-editor-content" contenteditable="true" spellcheck="false"${dataHint}>${escaped}</div>
      </div>`;
    }

    // 加载文本到编辑器
    function loadJsonText(text) {
      jsonLines = text ? text.split('\n') : [''];
      if (jsonLines.length === 0) jsonLines = [''];
      collapsedFolds.clear();
      renderEditor();
      applyTheme();
    }

    // 处理 JSON 操作
    function processJson(mode) {
      syncAllLinesFromDOM();
      const input = getJsonText().trim();
      const errorEl = document.getElementById('jsonInputError');
      const statusEl = document.getElementById('jsonStatus');

      errorEl.style.display = 'none';
      statusEl.style.display = 'none';

      if (!input) {
        errorEl.textContent = '请输入 JSON 内容';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const parsed = JSON.parse(input);
        let result, msg;

        if (mode === 'beautify') {
          result = JSON.stringify(parsed, null, 2);
          msg = '✓ 已美化';
        } else {
          result = JSON.stringify(parsed);
          msg = `✓ 已压缩 (${new Blob([result]).size} 字节)`;
        }

        loadJsonText(result);

        statusEl.textContent = msg;
        statusEl.style.color = '#28a745';
        statusEl.style.display = 'block';
      } catch (e) {
        const posMatch = e.message.match(/position\s+(\d+)/);
        let errMsg = 'JSON 解析错误: ' + e.message;
        if (posMatch && input.length > parseInt(posMatch[1])) {
          let pos = Math.max(0, parseInt(posMatch[1]) - 1);
          while (pos > 0 && /\s/.test(input[pos])) pos--;
          const actualLine = input.substring(0, pos + 1).split('\n').length;
          errMsg = `JSON 解析错误: 第 ${actualLine} 行 — ${e.message.replace(/at position \d+ \(line \d+ column \d+\)/, '').trim()}`;
        }
        errorEl.textContent = errMsg;
        errorEl.style.display = 'block';
      }
    }

    function copyJsonContent() {
      syncAllLinesFromDOM();
      const text = getJsonText();
      if (!text.trim()) { showToast('没有可复制的内容'); return; }
      navigator.clipboard.writeText(text).then(() => {
        showToast('JSON 已复制到剪贴板');
      });
    }

    function clearJson() {
      jsonLines = [''];
      collapsedFolds.clear();
      foldPairs = {};
      renderEditor();
      applyTheme();
      document.getElementById('jsonInputError').style.display = 'none';
      document.getElementById('jsonStatus').style.display = 'none';
    }

    // 折叠相关
    function findFoldPairs(jsonStr) {
      const lines = jsonStr.split('\n');
      const lineStarts = [];
      let pos = 0;
      for (let i = 0; i < lines.length; i++) {
        lineStarts.push(pos);
        pos += lines[i].length + 1;
      }

      function lineForCharPos(charPos) {
        let lo = 0, hi = lineStarts.length - 1;
        while (lo < hi) {
          const mid = Math.ceil((lo + hi) / 2);
          if (lineStarts[mid] <= charPos) lo = mid;
          else hi = mid - 1;
        }
        return lo;
      }

      const stack = [];
      const pairs = {};

      for (let i = 0; i < jsonStr.length; i++) {
        const ch = jsonStr[i];
        if (ch === '{' || ch === '[') {
          stack.push({ char: ch, pos: i });
        } else if (ch === '}' || ch === ']') {
          if (stack.length === 0) continue;
          const opener = stack.pop();
          if ((opener.char === '{' && ch === '}') || (opener.char === '[' && ch === ']')) {
            const openLine = lineForCharPos(opener.pos);
            const closeLine = lineForCharPos(i);
            if (openLine !== closeLine) {
              pairs[openLine] = closeLine;
            }
          }
        }
      }
      return pairs;
    }

    function isLineHiddenByFold(lineIndex) {
      for (const openLine of collapsedFolds) {
        const closeLine = foldPairs[openLine];
        if (lineIndex > openLine && lineIndex <= closeLine) {
          return true;
        }
      }
      return false;
    }

    // 点击折叠箭头
    function handleFoldClick(openLine, foldEl) {
      const closeLine = foldPairs[openLine];
      if (closeLine === undefined) return;

      if (collapsedFolds.has(openLine)) {
        collapsedFolds.delete(openLine);
      } else {
        collapsedFolds.add(openLine);
      }

      // 找到 foldEl 所在的编辑器容器
      const editorLines = foldEl.closest('.json-editor-lines');
      if (!editorLines) return;

      // 更新当前行箭头
      const toggleEl = editorLines.querySelector(`.json-editor-line[data-line="${openLine}"] .json-editor-fold`);
      if (toggleEl) {
        toggleEl.textContent = collapsedFolds.has(openLine) ? '▶' : '▼';
        toggleEl.classList.toggle('collapsed', collapsedFolds.has(openLine));
      }

      // 更新受影响行的可见性和箭头
      const parentLine = editorLines.querySelector(`.json-editor-line[data-line="${openLine}"]`);
      if (parentLine) {
        parentLine.classList.toggle('json-editor-collapsed-line', collapsedFolds.has(openLine));
        // 更新折叠提示
        const contentEl = parentLine.querySelector('.json-editor-content');
        if (contentEl) {
          if (collapsedFolds.has(openLine) && closeLine > openLine + 1) {
            contentEl.setAttribute('data-hint', '// ... ' + (closeLine - openLine) + ' 行已折叠');
          } else {
            contentEl.removeAttribute('data-hint');
          }
        }
      }

      // 更新受影响行的可见性和箭头
      for (let i = openLine + 1; i <= closeLine; i++) {
        const lineEl = editorLines.querySelector(`.json-editor-line[data-line="${i}"]`);
        if (!lineEl) continue;
        const hidden = isLineHiddenByFold(i);
        lineEl.classList.toggle('hidden', hidden);
        const innerFold = lineEl.querySelector('.json-editor-fold.can-fold');
        if (innerFold && !hidden) {
          const innerOpen = parseInt(innerFold.dataset.open);
          innerFold.textContent = collapsedFolds.has(innerOpen) ? '▶' : '▼';
        }
      }
    }

    // 委托点击事件
    document.addEventListener('click', function(e) {
      const fold = e.target.closest('.json-editor-fold.can-fold');
      if (!fold) return;
      e.stopPropagation();
      const openLine = parseInt(fold.dataset.open);
      handleFoldClick(openLine, fold);
    });

    // 处理编辑器的键盘输入
    document.addEventListener('keydown', function(e) {
      const contentEl = e.target.closest('.json-editor-content');
      if (!contentEl) return;
      const lineEl = contentEl.closest('.json-editor-line');
      if (!lineEl) return;
      const editorLines = contentEl.closest('.json-editor-lines');
      if (!editorLines) return;
      const isFullscreen = !!editorLines.closest('.fullscreen-overlay');
      const lineIndex = parseInt(lineEl.dataset.line);

      if (e.key === 'Enter') {
        e.preventDefault();
        // 获取光标位置，拆分当前行
        const sel = window.getSelection();
        if (sel.rangeCount === 0) return;
        const range = sel.getRangeAt(0);
        const offset = range.startOffset;

        // 获取光标前的文本和光标后的文本
        const fullText = contentEl.textContent || '';
        const before = fullText.substring(0, offset);
        const after = fullText.substring(offset);

        // 更新当前行
        contentEl.textContent = before;
        jsonLines[lineIndex] = before;

        // 插入新行
        jsonLines.splice(lineIndex + 1, 0, after);
        collapsedFolds = updateCollapsedAfterInsert(lineIndex + 1);

        if (isFullscreen) {
          // 在全屏模式下重新渲染
          renderToContainer(editorLines, 'fs-line-');
        } else {
          renderEditor();
          applyTheme();
        }

        // 聚焦新行
        const newLineEl = editorLines.querySelector(`.json-editor-line[data-line="${lineIndex + 1}"]`);
        if (newLineEl) {
          const newContent = newLineEl.querySelector('.json-editor-content');
          if (newContent) {
            newContent.focus();
            const newRange = document.createRange();
            const firstChild = newContent.firstChild || newContent;
            newRange.setStart(firstChild, 0);
            newRange.collapse(true);
            const newSel = window.getSelection();
            newSel.removeAllRanges();
            newSel.addRange(newRange);
          }
        }
        return;
      }

      if (e.key === 'Tab') {
        e.preventDefault();
        document.execCommand('insertText', false, '  ');
        return;
      }

      if (e.key === 'Backspace') {
        // 如果当前行为空且不是最后一行，删除该行并合并到上一行
        const text = contentEl.textContent || '';
        if (text === '' && jsonLines.length > 1) {
          const sel = window.getSelection();
          if (sel.rangeCount > 0 && sel.getRangeAt(0).startOffset === 0) {
            e.preventDefault();
            jsonLines.splice(lineIndex, 1);
            collapsedFolds = updateCollapsedAfterDelete(lineIndex);
            foldPairs = findFoldPairs(jsonLines.join('\n'));

            if (isFullscreen) {
              renderToContainer(editorLines, 'fs-line-');
            } else {
              renderEditor();
              applyTheme();
            }

            // 聚焦上一行末尾
            const prevLineIndex = Math.max(0, lineIndex - 1);
            const prevLineEl = editorLines.querySelector(`.json-editor-line[data-line="${prevLineIndex}"]`);
            if (prevLineEl) {
              const prevContent = prevLineEl.querySelector('.json-editor-content');
              if (prevContent) {
                prevContent.focus();
                const prevRange = document.createRange();
                const lastChild = prevContent.lastChild;
                if (lastChild) {
                  prevRange.setStartAfter(lastChild);
                } else {
                  prevRange.setStart(prevContent, 0);
                }
                prevRange.collapse(true);
                const prevSel = window.getSelection();
                prevSel.removeAllRanges();
                prevSel.addRange(prevRange);
              }
            }
            return;
          }
        }
      }

      // 延迟同步行内容到 jsonLines
      setTimeout(() => syncLineFromDOM(lineIndex), 0);
    });

    // 渲染到指定容器
    function renderToContainer(container, idPrefix) {
      foldPairs = findFoldPairs(jsonLines.join('\n'));
      let html = '';
      for (let i = 0; i < jsonLines.length; i++) {
        const isFoldable = foldPairs[i] !== undefined;
        const hidden = isLineHiddenByFold(i);
        html += buildLineHtml(i, jsonLines[i], isFoldable, hidden, idPrefix);
      }
      container.innerHTML = html;
    }

    // 粘贴时保持纯文本
    document.addEventListener('paste', function(e) {
      const contentEl = e.target.closest('.json-editor-content');
      if (!contentEl) return;
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });

    // 插入新行后更新折叠状态
    function updateCollapsedAfterInsert(insertedAt) {
      const newSet = new Set();
      for (const openLine of collapsedFolds) {
        if (openLine >= insertedAt) {
          newSet.add(openLine + 1);
        } else {
          newSet.add(openLine);
        }
      }
      return newSet;
    }

    function updateCollapsedAfterDelete(deletedAt) {
      const newSet = new Set();
      for (const openLine of collapsedFolds) {
        if (openLine > deletedAt) {
          newSet.add(openLine - 1);
        } else if (openLine < deletedAt) {
          newSet.add(openLine);
        }
      }
      return newSet;
    }

    // ========== JSON 主题切换 ==========
    let jsonTheme = 'light';

    function applyTheme() {
      const isDark = jsonTheme === 'dark';
      const editor = document.getElementById('jsonEditor');
      const themeBtn = document.getElementById('jsonThemeBtn');

      if (editor) {
        editor.classList.toggle('theme-dark', isDark);
      }
      themeBtn.textContent = isDark ? '🌙' : '☀️';
      themeBtn.title = isDark ? '切换亮色主题' : '切换暗色主题';

      const fsOverlay = document.querySelector('.fullscreen-overlay');
      if (fsOverlay) {
        fsOverlay.classList.toggle('theme-dark', isDark);
      }

      try { localStorage.setItem('jsonTheme', jsonTheme); } catch(e) {}
    }

    function toggleJsonTheme() {
      jsonTheme = jsonTheme === 'light' ? 'dark' : 'light';
      applyTheme();
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ========== 全屏模式 ==========
    function toggleFullscreen() {
      const existing = document.querySelector('.fullscreen-overlay');

      if (existing) {
        // 退出全屏：同步内容回主编辑器
        const fsLinesEl = document.getElementById('fsEditorLines');
        if (fsLinesEl) {
          // 从全屏编辑器读取内容
          const fsLineEls = fsLinesEl.querySelectorAll('.json-editor-line');
          const fsLines = [];
          fsLineEls.forEach(el => {
            const contentEl = el.querySelector('.json-editor-content');
            fsLines.push(contentEl ? (contentEl.textContent || '') : '');
          });
          jsonLines = fsLines.length > 0 ? fsLines : [''];
        }
        existing.remove();
        // 重新渲染主编辑器
        collapsedFolds.clear();
        renderEditor();
        applyTheme();
        return;
      }

      // 进入全屏
      syncAllLinesFromDOM();
      const isDark = jsonTheme === 'dark';

      const overlay = document.createElement('div');
      overlay.className = 'fullscreen-overlay' + (isDark ? ' theme-dark' : '');
      overlay.innerHTML = `
        <div class="fullscreen-header">
          <span>📋 JSON 全屏编辑</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="btn" onclick="processJsonFromFullscreen()" style="padding:6px 16px;font-size:0.9rem;">美化</button>
            <button class="fullscreen-close" onclick="toggleFullscreen()">&times;</button>
          </div>
        </div>
        <div class="json-editor${isDark ? ' theme-dark' : ''}" id="fsJsonEditor">
          <div id="fsEditorLines" class="json-editor-lines"></div>
        </div>
      `;
      document.body.appendChild(overlay);

      // 渲染全屏编辑器内容
      const fsLinesEl = document.getElementById('fsEditorLines');
      let html = '';
      for (let i = 0; i < jsonLines.length; i++) {
        const isFoldable = foldPairs[i] !== undefined;
        const isCollapsed = collapsedFolds.has(i);
        const hidden = isLineHiddenByFold(i);
        html += buildLineHtml(i, jsonLines[i], isFoldable, hidden, 'fs-line-');
      }
      fsLinesEl.innerHTML = html;

      // 聚焦第一行
      setTimeout(() => {
        const firstContent = fsLinesEl.querySelector('.json-editor-content');
        if (firstContent) firstContent.focus();
      }, 50);

      const escHandler = (e) => {
        if (e.key === 'Escape') { toggleFullscreen(); }
      };
      document.addEventListener('keydown', escHandler, { once: true });
    }

    function processJsonFromFullscreen() {
      // 从全屏编辑器同步内容
      const fsLinesEl = document.getElementById('fsEditorLines');
      if (!fsLinesEl) return;
      const fsLineEls = fsLinesEl.querySelectorAll('.json-editor-line');
      const lines = [];
      fsLineEls.forEach(el => {
        const contentEl = el.querySelector('.json-editor-content');
        lines.push(contentEl ? (contentEl.textContent || '') : '');
      });
      const input = lines.join('\n').trim();

      if (!input) {
        alert('请输入 JSON 内容');
        return;
      }
      try {
        const parsed = JSON.parse(input);
        const result = JSON.stringify(parsed, null, 2);
        const resultLines = result.split('\n');

        // 更新全屏编辑器
        const newFoldPairs = findFoldPairs(result);
        let html = '';
        for (let i = 0; i < resultLines.length; i++) {
          const isFoldable = newFoldPairs[i] !== undefined;
          html += buildLineHtml(i, resultLines[i], isFoldable, false, 'fs-line-');
        }
        fsLinesEl.innerHTML = html;

        // 同步状态
        jsonLines = resultLines;
        foldPairs = newFoldPairs;
        collapsedFolds.clear();

        // 聚焦第一行
        setTimeout(() => {
          const firstContent = fsLinesEl.querySelector('.json-editor-content');
          if (firstContent) firstContent.focus();
        }, 50);
      } catch (e) {
        alert('JSON 解析错误: ' + e.message);
      }
    }

    // ========== 通用 ==========
    function copyTimestamp() {
      const ts = document.getElementById('currentTimestamp').textContent;
      if (ts === '-') return;
      navigator.clipboard.writeText(ts).then(() => {
        showToast('时间戳已复制: ' + ts);
      });
    }

    function copyResult(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板');
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 初始化
    updateCurrentTime();
    setInterval(updateCurrentTime, 1000);
    switchAlphaType('hex');

    // 填充时区选项
    const tzData = buildTimezoneOptions();
    document.getElementById('tsTimezone').innerHTML = tzData.optionsHtml;
    document.getElementById('dateTimezone').innerHTML = tzData.optionsHtml;

    // 加载保存的主题
    try {
      const saved = localStorage.getItem('jsonTheme');
      if (saved === 'dark') jsonTheme = 'dark';
    } catch(e) {}
    applyTheme();
    // 初始化编辑器
    loadJsonText('');

    // ========== Markdown 预览 ==========
    let mdRenderTimeout = null;

    function renderMd() {
      const input = document.getElementById('mdInput').value;
      const preview = document.getElementById('mdPreview');
      if (!input.trim()) {
        preview.innerHTML = '<div style="color:#aaa;text-align:center;padding-top:60px;">在左侧输入 Markdown 内容即可预览</div>';
        return;
      }
      try {
        preview.innerHTML = marked.parse(input);
      } catch (e) {
        preview.innerHTML = '<div style="color:#dc3545;">Markdown 渲染出错: ' + escapeHtml(e.message) + '</div>';
      }
    }

    function copyMdHtml() {
      const input = document.getElementById('mdInput').value.trim();
      if (!input) { showToast('没有可复制的内容'); return; }
      const html = marked.parse(input);
      navigator.clipboard.writeText(html).then(() => {
        showToast('HTML 已复制到剪贴板');
      });
    }

    function clearMd() {
      document.getElementById('mdInput').value = '';
      document.getElementById('mdPreview').innerHTML = '<div style="color:#aaa;text-align:center;padding-top:60px;">在左侧输入 Markdown 内容即可预览</div>';
    }

    // 全屏预览
    function toggleMdFullscreen() {
      const existing = document.querySelector('.md-fullscreen-overlay');
      if (existing) {
        existing.remove();
        document.body.style.overflow = '';
        return;
      }

      const input = document.getElementById('mdInput').value;
      const html = input.trim() ? marked.parse(input) : '<div style="color:#999;text-align:center;padding-top:80px;">暂无内容</div>';

      const overlay = document.createElement('div');
      overlay.className = 'md-fullscreen-overlay';
      overlay.innerHTML = `
        <div class="md-fullscreen-header">
          <span>📝 Markdown 预览</span>
          <button class="md-fullscreen-close" onclick="toggleMdFullscreen()">&times;</button>
        </div>
        <div class="md-fullscreen-preview">${html}</div>
      `;
      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';

      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) toggleMdFullscreen();
      });

      document.addEventListener('keydown', function escHandler(e) {
        if (e.key === 'Escape') { toggleMdFullscreen(); document.removeEventListener('keydown', escHandler); }
      });
    }

    // 实时预览：输入后 200ms 防抖
    document.addEventListener('input', function(e) {
      if (e.target.id !== 'mdInput') return;
      clearTimeout(mdRenderTimeout);
      mdRenderTimeout = setTimeout(renderMd, 200);
    });

    // 初始化 marked（CDN 加载后）
    function initMarked() {
      if (typeof marked === 'undefined') {
        setTimeout(initMarked, 100);
        return;
      }
      marked.setOptions({
        breaks: true,
        gfm: true
      });
    }
    initMarked();

    // 初始预览
    renderMd();
  </script>
</body>
</html>
